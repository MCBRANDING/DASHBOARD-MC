<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tareas Equipo — Merlyz Castellanos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap');
  :root{
    --bg:#F5EBE0; --surface:#FFFFFF; --card:#EFE1D3; --vanilla:#D5BDAF;
    --beaver:#A37E6D; --ink:#3A2E27; --ink-soft:#7A6A5F; --alert:#B23A2E; --ok:#5C7A5A;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif;}
  .fraunces{font-family:'Fraunces',serif;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spin{animation:spin 1s linear infinite; display:inline-flex;}
  input,select,textarea{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--vanilla);
    background:var(--bg); font-size:14px; color:var(--ink); font-family:'Inter',sans-serif;
  }
  label{ font-size:12.5px; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:5px; }
  label .req{ color:var(--alert); }
  button{ font-family:'Inter',sans-serif; cursor:pointer; }
  .card{ background:var(--surface); border-radius:18px; padding:20px 18px; box-shadow:0 1px 3px rgba(58,46,39,0.08); margin-bottom:20px; }
  .field{ margin-bottom:14px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  .row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:14px; }
  .banner{ padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:16px; display:flex; gap:8px; align-items:flex-start; }
  .banner.ok{ background:#E1EADD; border:1px solid var(--ok); color:var(--ok); }
  .banner.warn{ background:#F2E7C9; border:1px solid #8a6d1c; color:#6b5417; }
  .banner.error{ background:#F3E0DC; border:1px solid var(--alert); color:var(--alert); }
  .heat-cell{ border-radius:12px; min-height:64px; padding:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:2px solid transparent; transition:transform .15s ease; }
  .heat-cell:hover{ transform:translateY(-2px); }
  .heat-cell.selected{ border-color:var(--ink); }
</style>
</head>
<body>
<div id="root"></div>

<script>
// ==================== CONFIG ====================
const TASKS_ENDPOINT = "/.netlify/functions/tasks";
const CREATE_ENDPOINT = "/.netlify/functions/create-brief";
const STORAGE_KEY = "briefs-pendientes";

const CLIENTES = ["PickleTour Venezuela","Philips Venezuela / Branvi","Full Connection","Concertación Ciudadana","Michelle Hair Studio & Spa","Merlyz Branding Estratégico","Otro"];
const TIPOS = ["Diseño gráfico","Copywriting / Guion","Video / Reel","Estrategia / Planificación","Reporte","Administrativo","Otro"];
const PERSONAS = ["Merlyz","Melissa","Pedro"];
const SOLICITANTES = ["Merlyz","Melissa","Pedro","Cliente"];
const PRIORIDADES = ["Alta","Media","Baja"];
const RESPONSABLES = ["Merlyz","Melissa","Pedro"];
const BUCKETS = ["Vencida","Hoy / Mañana","Esta semana","Más adelante"];

// ==================== ICONS (SVG strings) ====================
const ICONS = {
  send: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
  check: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
  clipboard: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V4a2 2 0 0 1 2-2h10"/></svg>`,
  trash: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
  alert: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  plusCircle: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--beaver)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>`,
  flame: `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--alert)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>`,
  clock: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  refresh: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>`,
};

// ==================== STATE ====================
const state = {
  tab: "brief",
  form: { nombre:"", cliente:CLIENTES[0], tipo:TIPOS[0], solicitadoPor:SOLICITANTES[0], responsable:PERSONAS[0], prioridad:"Media", fechaLimite:"", horas:"", descripcion:"", recursos:"", formato:"" },
  formStatus: "idle", formError: "",
  pending: [],
  copyLabel: "Copiar todo para Claude",
  manualText: null,
  tasks: [], dashLoading: true, dashError: null, lastSync: null,
  selectedCell: null,
};

try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) state.pending = JSON.parse(raw); } catch {}

function savePending(list){ state.pending = list; try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch {} }

function esc(str){
  return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

// ==================== DATE HELPERS ====================
function daysUntil(dateStr){
  if (!dateStr) return 999;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + "T00:00:00");
  return Math.round((d - today) / 86400000);
}
function bucketFor(dateStr){
  const days = daysUntil(dateStr);
  if (days < 0) return "Vencida";
  if (days <= 1) return "Hoy / Mañana";
  if (days <= 7) return "Esta semana";
  return "Más adelante";
}
function heatColor(hours){
  if (hours === 0) return "var(--card)";
  if (hours <= 3) return "#E4CFBB";
  if (hours <= 6) return "var(--vanilla)";
  if (hours <= 9) return "var(--beaver)";
  return "var(--alert)";
}

// ==================== RENDER: TABS ====================
function renderTabs(){
  return `
    <div style="max-width:640px; margin:0 auto; padding:16px 20px 0;">
      <div style="display:flex; gap:6px; background:var(--card); border-radius:999px; padding:4px;">
        <button data-tab="brief" style="flex:1; padding:12px 0; font-size:13.5px; font-weight:600; border:none; border-radius:999px; background:${state.tab==="brief"?"var(--ink)":"transparent"}; color:${state.tab==="brief"?"var(--bg)":"var(--ink-soft)"};">📝 Nuevo Brief</button>
        <button data-tab="dashboard" style="flex:1; padding:12px 0; font-size:13.5px; font-weight:600; border:none; border-radius:999px; background:${state.tab==="dashboard"?"var(--ink)":"transparent"}; color:${state.tab==="dashboard"?"var(--bg)":"var(--ink-soft)"};">🔥 Dashboard</button>
      </div>
    </div>`;
}

// ==================== RENDER: BRIEF FORM ====================
function selectOptions(list, selected){
  return list.map((o) => `<option value="${esc(o)}" ${o===selected?"selected":""}>${esc(o)}</option>`).join("");
}

function renderBrief(){
  const f = state.form;
  let banner = "";
  if (state.formStatus === "success") banner = `<div class="banner ok">${ICONS.check} Creado en Notion.</div>`;
  if (state.formStatus === "queued") banner = `<div class="banner warn">${ICONS.alert} No se pudo conectar ahora. Se guardó localmente en "Pendientes" — cópialo y pégaselo a Claude cuando puedas.</div>`;
  if (state.formStatus === "error") banner = `<div class="banner error">${ICONS.alert} ${esc(state.formError)}</div>`;

  const pendingHtml = state.pending.length === 0 ? "" : `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:8px;">
        <h2 class="fraunces" style="font-size:17px; font-weight:600; margin:0; display:flex; align-items:center; gap:6px;">${ICONS.plusCircle} Pendientes por subir (${state.pending.length})</h2>
        <button id="btn-copy-pending" style="display:flex; align-items:center; gap:6px; background:var(--beaver); color:#fff; border:none; border-radius:999px; padding:8px 14px; font-size:12.5px; font-weight:600;">${ICONS.clipboard} ${esc(state.copyLabel)}</button>
      </div>
      ${state.manualText ? `
        <p style="font-size:12px; color:var(--alert); margin:0 0 6px;">Toca el texto, se selecciona solo — cópialo y pégalo en el chat.</p>
        <textarea id="manual-copy-text" readonly style="min-height:120px; font-size:12px; font-family:monospace; margin-bottom:14px;">${esc(state.manualText)}</textarea>
      ` : ""}
      ${state.pending.map((p) => `
        <div style="display:flex; justify-content:space-between; align-items:flex-start; padding:10px 0; border-top:1px solid var(--card);">
          <div>
            <div style="font-size:13.5px; font-weight:600;">${esc(p.nombre)}</div>
            <div style="font-size:12px; color:var(--ink-soft);">${esc(p.cliente)} · ${esc(p.responsable)} · vence ${esc(p.fechaLimite||"sin fecha")}</div>
          </div>
          <button data-remove-id="${esc(p.id)}" style="background:none; border:none; color:var(--ink-soft); padding:4px;">${ICONS.trash}</button>
        </div>
      `).join("")}
    </div>`;

  return `
    <div style="max-width:640px; margin:0 auto; padding:24px 20px 60px;">
      <div style="margin-bottom:22px;">
        <div style="font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--beaver); font-weight:600;">Merlyz Castellanos · Branding Estratégico</div>
        <h1 class="fraunces" style="font-size:28px; font-weight:600; margin:4px 0 0;">Nuevo brief</h1>
        <p style="font-size:13px; color:var(--ink-soft); margin:4px 0 0;">Se guarda directo en Notion</p>
      </div>

      ${banner}

      <div class="card">
        <div class="field"><label>Nombre de tarea <span class="req">*</span></label>
          <input id="f-nombre" value="${esc(f.nombre)}" placeholder="Ej: Reel reactivación Full Connection"/></div>

        <div class="row2">
          <div><label>Cliente <span class="req">*</span></label><select id="f-cliente">${selectOptions(CLIENTES, f.cliente)}</select></div>
          <div><label>Tipo de tarea</label><select id="f-tipo">${selectOptions(TIPOS, f.tipo)}</select></div>
        </div>
        <div class="row2">
          <div><label>Solicitado por</label><select id="f-solicitadoPor">${selectOptions(SOLICITANTES, f.solicitadoPor)}</select></div>
          <div><label>Responsable <span class="req">*</span></label><select id="f-responsable">${selectOptions(PERSONAS, f.responsable)}</select></div>
        </div>
        <div class="row3">
          <div><label>Prioridad</label><select id="f-prioridad">${selectOptions(PRIORIDADES, f.prioridad)}</select></div>
          <div><label>Fecha límite <span class="req">*</span></label><input id="f-fechaLimite" type="date" value="${esc(f.fechaLimite)}"/></div>
          <div><label>Horas est.</label><input id="f-horas" type="number" min="0" step="0.5" value="${esc(f.horas)}" placeholder="0"/></div>
        </div>
        <div class="field"><label>Descripción / Objetivo</label>
          <textarea id="f-descripcion" style="min-height:70px;" placeholder="Qué se necesita y para qué">${esc(f.descripcion)}</textarea></div>
        <div class="row2" style="margin-bottom:18px;">
          <div><label>Recursos necesarios</label><input id="f-recursos" value="${esc(f.recursos)}" placeholder="Assets, accesos…"/></div>
          <div><label>Formato de entrega</label><input id="f-formato" value="${esc(f.formato)}" placeholder="PNG, PDF, Reel…"/></div>
        </div>
        <button id="btn-guardar" ${state.formStatus==="saving"?"disabled":""} style="width:100%; display:flex; align-items:center; justify-content:center; gap:8px; background:var(--ink); color:var(--bg); border:none; border-radius:12px; padding:13px 18px; font-size:14px; font-weight:600; opacity:${state.formStatus==="saving"?0.7:1};">
          ${state.formStatus==="saving" ? `<span class="spin">${ICONS.refresh}</span> Guardando…` : `${ICONS.send} Guardar brief`}
        </button>
      </div>

      ${pendingHtml}
    </div>`;
}

function readForm(){
  state.form.nombre = document.getElementById("f-nombre").value;
  state.form.cliente = document.getElementById("f-cliente").value;
  state.form.tipo = document.getElementById("f-tipo").value;
  state.form.solicitadoPor = document.getElementById("f-solicitadoPor").value;
  state.form.responsable = document.getElementById("f-responsable").value;
  state.form.prioridad = document.getElementById("f-prioridad").value;
  state.form.fechaLimite = document.getElementById("f-fechaLimite").value;
  state.form.horas = document.getElementById("f-horas").value;
  state.form.descripcion = document.getElementById("f-descripcion").value;
  state.form.recursos = document.getElementById("f-recursos").value;
  state.form.formato = document.getElementById("f-formato").value;
}

async function handleGuardar(){
  readForm();
  const f = state.form;
  if (!f.nombre.trim() || !f.cliente || !f.responsable || !f.fechaLimite){
    state.formStatus = "error";
    state.formError = "Completa al menos Nombre, Cliente, Responsable y Fecha límite.";
    render();
    setTimeout(() => { state.formStatus = "idle"; render(); }, 4000);
    return;
  }

  state.formStatus = "saving";
  render();

  const entry = { ...f, id: Date.now().toString() };

  try {
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), 10000);
    const resp = await fetch(CREATE_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(entry),
      signal: controller.signal,
    });
    clearTimeout(t);
    if (!resp.ok) throw new Error("no-ok");
    state.form = { nombre:"", cliente:CLIENTES[0], tipo:TIPOS[0], solicitadoPor:SOLICITANTES[0], responsable:PERSONAS[0], prioridad:"Media", fechaLimite:"", horas:"", descripcion:"", recursos:"", formato:"" };
    state.formStatus = "success";
    loadTasks(); // refresca el dashboard en segundo plano
  } catch {
    savePending([...state.pending, entry]);
    state.form = { nombre:"", cliente:CLIENTES[0], tipo:TIPOS[0], solicitadoPor:SOLICITANTES[0], responsable:PERSONAS[0], prioridad:"Media", fechaLimite:"", horas:"", descripcion:"", recursos:"", formato:"" };
    state.formStatus = "queued";
  }
  render();
  setTimeout(() => { state.formStatus = "idle"; render(); }, 3500);
}

async function handleCopyPending(){
  const text = state.pending.map((p, i) =>
    `${i+1}. ${p.nombre}\n   Cliente: ${p.cliente} | Tipo: ${p.tipo} | Responsable: ${p.responsable} | Solicitado por: ${p.solicitadoPor}\n   Prioridad: ${p.prioridad} | Fecha límite: ${p.fechaLimite} | Horas: ${p.horas||0}\n   Descripción: ${p.descripcion||"-"}\n   Recursos: ${p.recursos||"-"}\n   Formato de entrega: ${p.formato||"-"}`
  ).join("\n\n");
  const message = `Crea estas tareas en mi base "Tareas Equipo — Brief y Seguimiento" de Notion:\n\n${text}`;
  try {
    await navigator.clipboard.writeText(message);
    state.copyLabel = "¡Copiado!"; state.manualText = null;
    render();
    setTimeout(() => { state.copyLabel = "Copiar todo para Claude"; render(); }, 3000);
  } catch {
    state.manualText = message;
    render();
  }
}

// ==================== RENDER: DASHBOARD ====================
async function loadTasks(){
  state.dashLoading = true; state.dashError = null; render();
  try {
    const controller = new AbortController();
    const t = setTimeout(() => controller.abort(), 10000);
    const resp = await fetch(TASKS_ENDPOINT, { signal: controller.signal });
    clearTimeout(t);
    if (!resp.ok) throw new Error("no-ok");
    state.tasks = await resp.json();
    state.lastSync = new Date();
  } catch {
    state.dashError = "No se pudo conectar con Notion. Mostrando lo último cargado.";
  } finally {
    state.dashLoading = false;
    render();
  }
}

function buildGrid(){
  const g = {};
  RESPONSABLES.forEach((r) => { g[r] = {}; BUCKETS.forEach((b) => (g[r][b] = { hours:0, items:[] })); });
  state.tasks.forEach((t) => {
    if (!RESPONSABLES.includes(t.responsable) || !t.fechaLimite) return;
    const b = bucketFor(t.fechaLimite);
    g[t.responsable][b].hours += Number(t.horas)||0;
    g[t.responsable][b].items.push(t);
  });
  return g;
}

function renderDashboard(){
  const grid = buildGrid();
  const byClientMap = {};
  state.tasks.forEach((t) => { byClientMap[t.cliente] = (byClientMap[t.cliente]||0)+1; });
  const byClient = Object.entries(byClientMap).sort((a,b)=>b[1]-a[1]);
  const maxClientCount = Math.max(1, ...byClient.map(([,c])=>c));

  const urgentTasks = state.tasks
    .filter((t) => t.prioridad==="Alta" || bucketFor(t.fechaLimite)==="Vencida" || bucketFor(t.fechaLimite)==="Hoy / Mañana")
    .sort((a,b)=>daysUntil(a.fechaLimite)-daysUntil(b.fechaLimite));

  const heatRows = RESPONSABLES.map((r) => {
    const cells = BUCKETS.map((b) => {
      const cell = grid[r][b];
      const isSel = state.selectedCell && state.selectedCell.r===r && state.selectedCell.b===b;
      const textColor = cell.hours>6 ? "var(--bg)" : "var(--ink)";
      const subColor = cell.hours>6 ? "var(--bg)" : "var(--ink-soft)";
      return `<button class="heat-cell ${isSel?"selected":""}" data-cell-r="${esc(r)}" data-cell-b="${esc(b)}" style="background:${heatColor(cell.hours)}; cursor:${cell.items.length?"pointer":"default"};">
        <span class="fraunces" style="font-size:18px; font-weight:600; color:${textColor};">${cell.items.length}</span>
        <span style="font-size:10px; color:${subColor};">${cell.hours}h</span>
      </button>`;
    }).join("");
    return `<div style="font-size:14px; font-weight:600; display:flex; align-items:center;">${esc(r)}</div>${cells}`;
  }).join("");

  let selectedDetail = "";
  if (state.selectedCell){
    const { r, b } = state.selectedCell;
    const items = grid[r][b].items;
    selectedDetail = `
      <div style="margin-top:16px; background:var(--card); border-radius:12px; padding:14px;">
        <div style="font-size:12px; font-weight:700; color:var(--beaver); margin-bottom:6px;">${esc(r)} · ${esc(b)}</div>
        ${items.map((t,i) => `<div style="font-size:13px; padding:4px 0; ${i>0?"border-top:1px solid rgba(58,46,39,0.1);":""}">${esc(t.nombre)} <span style="color:var(--ink-soft);">· ${esc(t.cliente)} · ${t.horas}h</span></div>`).join("")}
      </div>`;
  }

  return `
    <div style="max-width:960px; margin:0 auto; padding:24px 20px 60px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
        <div>
          <div style="
